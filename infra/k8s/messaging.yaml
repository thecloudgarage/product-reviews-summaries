apiVersion: v1
kind: ConfigMap
metadata:
  name: messaging-config
  namespace: messaging
data:
  REDIS_USERNAME: default
  REDIS_PASSWORD: your-redis-password
  RABBITMQ_DEFAULT_USER: your-rabbitmq-username
  RABBITMQ_DEFAULT_PASS: your-rabbitmq-password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          envFrom:
            - configMapRef:
                name: messaging-config
          command: ["/bin/sh", "-c"]
          args:
            - redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: messaging
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          envFrom:
            - configMapRef:
                name: messaging-config
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: messaging
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: mgmt
      port: 15672
      targetPort: 15672
